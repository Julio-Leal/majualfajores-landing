<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maju Alfajores</title>
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/variables.css">
    
</head>
<body>
    <main>
        <div class="logo">
            <img src="assets/images/Maju/logos-png/logotransparent-2000px-png.png" alt="logo">
        </div>
        <div class="hero">
            <h2>Obrigado!</h2>
            <p>Seu apoio faz nosso trabalho <br> 
               ser ainda mais doce.
            </p>
            <h3>Como você prefere pagar?</h3>
        </div>
        <section class="container-pagamento">
        <div class="pagamento-pix">
            <div class="container-title">
                <div class="icon-pix">
                    <img src="assets/images/pix/pix.png" alt="pix-icon">
                </div>
                <div class="hero-pix">
                    <h2>PAGAR AGORA VIA PIX</h2>
                    <p>Valor: R$6,00</p>
                </div>
            </div>

            <div class="container-qrcode">
                <p>Escaneie o QR Code para pagar <br>
                   com o app do seu banco.
                </p>

                <img src="assets/images/qrcode/Screenshot_2.png" alt="temp-qrcode">
            </div>
        </div>
        
        <div class="divider">
            <span>OU</span>
        </div>

        <div class="pagamento-posterior">
            <div class="container-title">
                <h2>PAGAR DEPOIS</h2>
                <p>
                    Preencha seus dados que entraremos <br>
                    em contato para cobrança.
                </p>
            </div>

            <form action="">
                <label for="">Nome completo</label>
                <input type="text">
                <label for="">WhatsApp</label>
                <input type="number">
                <label for="">Quantidade</label>
                <input type="number">

                <button>
                    <img src="" alt="send-icon">
                    Enviar
                </button>
            </form>
        </div>
    </section>
    </main>
</body>
</html>
