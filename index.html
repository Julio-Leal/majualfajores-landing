<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maju Alfajores</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100..900&display=swap" rel="stylesheet">    

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    
    <main>

        <img id="background-img-main" src="assets/images/background/Design sem nome.png" alt="">

        <!-- Hero -->
        <section class="hero">
            
            <div class="logo">
                <img src="assets/images/Maju/logos-png/logotransparent-2000px-cut-png.png"
                    alt="Logo Maju Alfajores">
            </div>

            <div class="hero-content">
                <h1>Obrigado!</h1>

                <p>
                    Seu apoio faz nosso trabalho
                    <br>
                    ser ainda mais doce.
                </p>

                <h2>Como você prefere pagar?</h2>
            </div>

        </section>

        <!-- Pagamentos -->
        <section class="payment">

            <!-- PIX -->
            <article class="payment-card">

                <header class="payment-card__header">

                    <div class="payment-card__icon">
                        <img src="assets/images/pix/pix.png"
                            alt="Ícone do PIX">
                    </div>

                    <div class="payment-card__title">
                        <h2>Pagar agora via PIX</h2>
                        <p>Valor: <strong>R$ 6,00</strong></p>
                    </div>

                </header>

                <div class="payment-card__body">

                    <p>
                        Escaneie o QR Code para pagar
                        <br>
                        com o aplicativo do seu banco.
                    </p>

                    <figure class="qrcode">
                        <img src="assets/images/qrcode/mp-qrcode.jpeg"
                            alt="QR Code para pagamento via PIX">
                    </figure>

                    <button id="btn-copy-pix">
                        <img src="assets/images/pix/pix icon white.svg" alt="">
                        Copiar chave PIX
                    </button>
                </div>

            </article>

            <!-- Divisor -->
            <div class="divider">
                <span>OU</span>
            </div>

            <!-- Formulário -->
            <article class="payment-card">

                <header class="payment-card__header">

                    <div class="payment-card__icon">
                        <img src="assets/images/formulario/formulario-de-contato.png"
                            alt="ícone Formulário">
                    </div>

                    <div class="payment-card__title">
                        <h2>Pagar no pagamento</h2>

                        <p>
                            Preencha seus dados e entraremos
                            <br>
                            em contato para cobrança.
                        </p>
                    </div>

                </header>

                <form class="payment-form">

                    <div class="form-group">
                        <label for="name">Nome completo</label>
                        <input
                            id="nome"
                            type="text"
                            placeholder="Digite seu nome"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="phone">WhatsApp</label>
                        <input
                            id="whatsapp"
                            type="tel"
                            placeholder="(44) 99999-9999"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="quantity">Quantidade</label>
                        <input
                            id="quantidade"
                            type="number"
                            min="1"
                            placeholder="Quantidade de alfajores"
                            required>
                    </div>

                    <button id="btn-enviar" type="submit" class="btn-send">

                        <img src="assets/images/formulario/mandar.png"
                            alt=""
                            aria-hidden="true">

                        <span>Enviar</span>

                    </button>

                </form>

            </article>

        </section>

    </main>

    <script src="assets/js/script.js"></script>
    <script src="assets/js/formulario.js"></script>
    <script src="assets/js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
