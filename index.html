<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maju Alfajores</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/variables.css">
</head>
<body>
    <main>
        <div class="logo">
            <img src="" alt="logo">
        </div>
        <div class="hero">
            <h2>Obrigdo!</h2>
            <p>Seu apoio faz nosso trabalho <br> 
               ser ainda mais doce.
            </p>
            <h3>Como você prefere pagar?</h3>
        </div>
        <section class="container-pagamento">
        <div class="pagamento-pix">
            <div class="container-title">
                <div class="icon-pix">
                    <img src="" alt="pix-icon">
                </div>
                <div class="hero-pix">
                    <h2>PAGAR AGORA VIA PIX</h2>
                    <p>Valor: R$6,00</p>
                </div>
            </div>

            <div class="container-qrcode">
                <p>Escaneie o QR Code para pagar <br>
                   com o app do seu banco.
                </p>

                <img src="assets/images/qrcode/Screenshot_2.png" alt="temp-qrcode">
            </div>

            
        </div>
        <div class="pagamento-posterior">
            <div class="container-title">
                <h2>PAGAR DEPOIS</h2>
            </div>
        </div>
    </section>
    </main>
</body>
</html>
